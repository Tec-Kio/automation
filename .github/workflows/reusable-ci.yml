name: Reusable Global CI

on:
  workflow_call:
    inputs:
      run_python:
        required: false
        type: boolean
        default: true
      run_node:
        required: false
        type: boolean
        default: true
      run_security:
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  repo-health:
    name: Repository health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate repository health report
        shell: bash
        run: |
          mkdir -p reports
          {
            echo "# Repository Health Report"
            echo
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "## Files"
            find . -maxdepth 3 -type f | sort | sed 's#^\./#- #'
            echo
            echo "## Required files"
            for f in README.md .gitignore .github/workflows/global-ci.yml; do
              if [ -f "$f" ]; then
                echo "- OK: $f"
              else
                echo "- MISSING: $f"
              fi
            done
          } | tee reports/repo-health.md

      - uses: actions/upload-artifact@v4
        with:
          name: repo-health-report
          path: reports/repo-health.md

  python:
    name: Python checks
    runs-on: ubuntu-latest
    if: ${{ inputs.run_python }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect Python
        id: detect
        shell: bash
        run: |
          if [ -f pyproject.toml ] || [ -f requirements.txt ] || find . -maxdepth 3 -name "*.py" | grep -q .; then
            echo "python_project=true" >> "$GITHUB_OUTPUT"
          else
            echo "python_project=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.detect.outputs.python_project == 'true'
        with:
          python-version: "3.12"

      - name: Install tooling
        if: steps.detect.outputs.python_project == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pytest
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt || true
          fi

      - name: Ruff
        if: steps.detect.outputs.python_project == 'true'
        run: ruff check . || true

      - name: Pytest
        if: steps.detect.outputs.python_project == 'true'
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            echo "No tests directory found; skipping pytest."
          fi

  node:
    name: Node checks
    runs-on: ubuntu-latest
    if: ${{ inputs.run_node }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect Node
        id: detect
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "node_project=true" >> "$GITHUB_OUTPUT"
          else
            echo "node_project=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.node_project == 'true'
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.detect.outputs.node_project == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        if: steps.detect.outputs.node_project == 'true'
        run: npm run lint --if-present

      - name: Test
        if: steps.detect.outputs.node_project == 'true'
        run: npm test --if-present

  security:
    name: Secret scan
    runs-on: ubuntu-latest
    if: ${{ inputs.run_security }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
